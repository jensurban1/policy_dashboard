<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#111318;--text2:#4a5568;--text3:#9aa5b4;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --blue:#2563eb;--teal:#0d9488;--amber:#b45309;--gray:#6b7280;--rose:#dc2626;
}
html{font-size:13px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
.sidebar{width:172px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo .name{font-size:13px;font-weight:600;letter-spacing:-.2px}
.sb-logo .sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.sb-sec{padding:14px 8px 4px}
.sb-lbl{font-size:9.5px;font-weight:500;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text2);text-decoration:none;transition:background .12s,color .12s}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nd-bl{background:var(--blue)}.nd-tl{background:var(--teal)}.nd-am{background:var(--amber)}.nd-gy{background:var(--gray)}
.nav-ext{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:none;transition:color .12s,background .12s}
.nav-ext:hover{color:var(--text2);background:var(--bg2)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--text3);margin-top:2px}
.srch{position:relative}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text3);pointer-events:none}
.srch input{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:7px 12px 7px 29px;font-size:12.5px;font-family:'Noto Sans KR',sans-serif;color:var(--text);width:210px;outline:none;transition:border-color .15s}
.srch input::placeholder{color:var(--text3)}
.srch input:focus{border-color:var(--accent);background:var(--bg)}

/* CONTENT */
.content{padding:20px 24px 48px;display:flex;flex-direction:column;gap:20px}

/* SECTION BLOCK */
.sblock{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fu .2s ease both}
.shead{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)}
.shead-l{display:flex;align-items:center;gap:8px}
.sacc{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.sname{font-size:13px;font-weight:600;letter-spacing:-.2px}
.scnt{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:1px 7px;border-radius:10px;font-family:'IBM Plex Mono',monospace}
.ssub{font-size:11px;color:var(--text3)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:500;color:var(--text3);padding:7px 16px;text-align:left;letter-spacing:.4px;background:var(--bg2);border-bottom:1px solid var(--border)}
.tbl th:last-child{text-align:right}
.tbl td{padding:10px 16px;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg2);transition:background .1s}
.org-td{font-weight:600;font-size:12.5px;color:var(--text);white-space:nowrap;vertical-align:top;padding-top:11px;border-right:1px solid var(--border)}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:2px 8px;border:1px solid var(--border2);border-radius:5px;color:var(--text2);background:var(--bg2);white-space:nowrap}
.ftxt{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text3);line-height:1.7}
.star{color:var(--amber)}.nosave{color:var(--rose)}
.go{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.go:hover{text-decoration:underline}
.go svg{width:10px;height:10px}
.nolink{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}

.acc-bl{background:var(--blue)}.acc-tl{background:var(--teal)}.acc-am{background:var(--amber)}.acc-gy{background:var(--gray)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:12.5px}

@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo">
    <div class="name">정책 자료</div>
    <div class="sub">Urban Planning</div>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">자료 목록</div>
    <a class="nav-item active" href="#cat-정책기본구상" data-cat="정책기본구상"><span class="ndot nd-bl"></span>정책기본구상</a>
    <a class="nav-item" href="#cat-지자체정책구상" data-cat="지자체정책구상"><span class="ndot nd-tl"></span>지자체정책구상</a>
    <a class="nav-item" href="#cat-사업계획안" data-cat="사업계획안"><span class="ndot nd-am"></span>사업계획(안)</a>
    <a class="nav-item" href="#cat-각종법령" data-cat="각종법령"><span class="ndot nd-gy"></span>각종 법령</a>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">외부 링크</div>
    <a class="nav-ext" href="https://www.molit.go.kr" target="_blank">↗ 국토교통부</a>
    <a class="nav-ext" href="https://www.seoul.go.kr" target="_blank">↗ 서울특별시</a>
    <a class="nav-ext" href="https://www.law.go.kr" target="_blank">↗ 법제처</a>
    <a class="nav-ext" href="https://www.g2b.go.kr" target="_blank">↗ 나라장터</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div>
      <div class="tb-title">정책 자료 대시보드</div>
      <div class="tb-sub">전체 · <span id="cntLabel">0</span>개 링크</div>
    </div>
    <div class="srch">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M11 11l3 3"/></svg>
      <input id="srchInput" type="text" placeholder="기관명, 자료명 검색…">
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const DATA = [
  {cat:"정책기본구상",sub:"국회",org:"국토교통위원회",
   titles:["국토교통위 소관 의안","심사보고서","검토보고서"],
   folder:"★사업별 자료 - 법령/지침",
   url:"https://ltc.na.go.kr/cmmit/bill/cntsBill/list.do?menuNo=2000079"},
  {cat:"정책기본구상",sub:"국회",org:"국회입법조사처",
   titles:["국토해양팀 소관 연구보고서"],
   folder:"★사업별 자료 - 법령/지침",
   url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0043"},
  {cat:"정책기본구상",sub:"국회",org:"국회입법조사처",
   titles:["국토해양팀 소관 정책연구용역"],
   folder:"★사업별 자료 - 법령/지침",
   url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0010"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",
   titles:["국토정책 Brief"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103050000&pub_kind=BR_1"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",
   titles:["워킹페이퍼"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103090000&pub_kind=WKP"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",
   titles:["월간국토 Article"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.krihs.re.kr/krihsLibraryArticle/articleList.es?mid=a10103010000&pub_kind=1"},
  {cat:"정책기본구상",sub:"국토교통부",org:"국토교통부",
   titles:["정책발표용 홍보자료","보도자료 (국토도시)"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.molit.go.kr/USR/NEWS/m_71/lst.jsp"},
  {cat:"정책기본구상",sub:"국토교통부",org:"국토교통부",
   titles:["정책정보 (국토도시)"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.molit.go.kr/USR/policyData/m_34681/lst.jsp"},
  {cat:"지자체정책구상",sub:"서울특별시",org:"미래공간기획관·균형발전본부·도시공간본부·주택실",
   titles:["정책발표용 홍보자료","보도자료"],
   folder:"★사업별 자료 - 정책/연구",
   url:"https://www.seoul.go.kr/news/news_report.do"},
  {cat:"지자체정책구상",sub:"서울특별시",org:"미래공간기획관·균형발전본부·도시공간본부·주택실",
   titles:["법률에 따른 기본계획","사업별 운영지침 등"],
   folder:"★사업별 자료 - 상위계획",
   url:"https://urban.seoul.go.kr/view/html/PMNU5020000001"},
  {cat:"지자체정책구상",sub:"서울시의회",org:"주택공간위원회",
   titles:["주택공간위원회 소관 의안","심사보고서","검토보고서"],
   folder:"★사업별 자료 - 법령/지침",
   url:"https://www.smc.seoul.kr/info/index.do?menuId=001003008"},
  {cat:"지자체정책구상",sub:"서울시의회",org:"도시계획균형위원회",
   titles:["도시계획균형위원회 소관 의안","심사보고서","검토보고서"],
   folder:"★사업별 자료 - 법령/지침",
   url:"https://www.smc.seoul.kr/info/index.do?menuId=001003008"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",
   titles:["열람공고(안)"],
   folder:"★사업별 자료 - 참고사례",
   url:"https://urban.seoul.go.kr/view/html/PMNU4010000001"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",
   titles:["결정고시(안)"],
   folder:"★사업별 자료 - 참고사례",
   url:"https://urban.seoul.go.kr/view/html/PMNU4030100001"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",
   titles:["위원회 심의 결과"],
   folder:"저장 X",
   url:"https://commission.eseoul.go.kr/"},
  {cat:"각종법령",sub:"각종법령",org:"국가법령정보센터",
   titles:["법, 시행령, 시행규칙, 조례 등"],
   folder:"★사업별 자료 - 법령/지침 (파일이 아닌 링크로 저장)",
   url:"https://www.law.go.kr/main.html"},
];

const CATS = [
  {key:"정책기본구상", label:"정책기본구상", acc:"acc-bl", ssub:"국회 · 국토연구원 · 국토교통부"},
  {key:"지자체정책구상",label:"지자체정책구상",acc:"acc-tl", ssub:"서울특별시 · 서울시의회"},
  {key:"사업계획안",   label:"사업계획(안)",  acc:"acc-am", ssub:"서울특별시"},
  {key:"각종법령",     label:"각종 법령",     acc:"acc-gy", ssub:"국가법령정보센터"},
];

let q = "";

function fmt(f){
  return f.replace(/★/g,'<span class="star">★</span>').replace(/저장 X/g,'<span class="nosave">저장 X</span>');
}
function goLink(url){
  if(!url) return `<span class="nolink">링크없음</span>`;
  return `<a class="go" href="${url}" target="_blank" rel="noopener">바로가기 <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M1 9L9 1M9 1H4M9 1v5"/></svg></a>`;
}

// Group consecutive rows by org, merging them with rowspan
function makeOrgGroups(rows){
  const groups=[];
  rows.forEach(r=>{
    const last=groups[groups.length-1];
    if(last && last.org===r.org){
      last.entries.push({titles:r.titles,folder:r.folder,url:r.url});
    } else {
      groups.push({org:r.org,entries:[{titles:r.titles,folder:r.folder,url:r.url}]});
    }
  });
  return groups;
}

function render(){
  const content=document.getElementById("content");
  content.innerHTML="";
  let total=0;

  CATS.forEach((c,ci)=>{
    let rows=DATA.filter(d=>d.cat===c.key);
    if(q) rows=rows.filter(d=>
      d.org.toLowerCase().includes(q)||
      d.titles.some(t=>t.toLowerCase().includes(q))||
      d.sub.toLowerCase().includes(q)
    );
    if(!rows.length) return;

    const cnt=rows.reduce((a,r)=>a+r.titles.length,0);
    total+=cnt;

    const block=document.createElement("div");
    block.className="sblock";
    block.id=`cat-${c.key}`;
    block.style.animationDelay=`${ci*35}ms`;

    block.innerHTML=`
      <div class="shead">
        <div class="shead-l">
          <span class="sacc ${c.acc}"></span>
          <span class="sname">${c.label}</span>
          <span class="scnt">${cnt}건</span>
        </div>
        <span class="ssub">${c.ssub}</span>
      </div>
    `;

    const tbl=document.createElement("table");
    tbl.className="tbl";
    tbl.innerHTML=`<colgroup><col style="width:22%"><col style="width:26%"><col style="width:34%"><col style="width:18%"></colgroup>
      <thead><tr><th>기관</th><th>자료명</th><th>폴더 체계</th><th style="text-align:right">바로가기</th></tr></thead>`;

    const tbody=document.createElement("tbody");
    const groups=makeOrgGroups(rows);

    groups.forEach(g=>{
      g.entries.forEach((e,ei)=>{
        const tr=document.createElement("tr");

        // org cell with rowspan on first entry only
        if(ei===0){
          const td=document.createElement("td");
          td.className="org-td";
          td.rowSpan=g.entries.length;
          td.textContent=g.org;
          tr.appendChild(td);
        }

        // titles
        const td2=document.createElement("td");
        td2.innerHTML=`<div class="chips">${e.titles.map(t=>`<span class="chip">${t}</span>`).join("")}</div>`;
        tr.appendChild(td2);

        // folder
        const td3=document.createElement("td");
        td3.innerHTML=`<div class="ftxt">${fmt(e.folder)}</div>`;
        tr.appendChild(td3);

        // link
        const td4=document.createElement("td");
        td4.style.textAlign="right";
        td4.innerHTML=goLink(e.url);
        tr.appendChild(td4);

        tbody.appendChild(tr);
      });
    });

    tbl.appendChild(tbody);
    block.appendChild(tbl);
    content.appendChild(block);
  });

  document.getElementById("cntLabel").textContent=total;
  if(!content.children.length){
    content.innerHTML=`<div class="empty">검색 결과가 없습니다.</div>`;
  }
}

// scroll spy
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const cat=e.target.id.replace("cat-","");
      document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.cat===cat));
    }
  });
},{threshold:0.25});

document.getElementById("srchInput").oninput=e=>{q=e.target.value.toLowerCase();render();document.querySelectorAll(".sblock").forEach(el=>io.observe(el));};

render();
document.querySelectorAll(".sblock").forEach(el=>io.observe(el));
</script>
</body>
</html>
