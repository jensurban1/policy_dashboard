<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --mono:"D2Coding","Consolas","Courier New",monospace;
  --bg:#f4f6f9;--bg2:#ffffff;--bg3:#f1f3f7;--bg4:#e8ebf2;
  --bd:rgba(0,0,0,0.06);--bd2:rgba(0,0,0,0.11);
  --t:#1a202c;--t2:#4a5568;--t3:#a0aec0;
  --blue:#3b82f6;--blue-lt:#eff6ff;--blue-bd:#bfdbfe;
  --amber:#f59e0b;--red:#ef4444;
  --sb:#1a2236;--sb-t:#cbd5e1;--sb-m:#64748b;
}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
aside{width:176px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.brand{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.brand-t{font-size:12.5px;font-weight:600;color:#f1f5f9;letter-spacing:-.2px;line-height:1.4;}
.brand-s{font-size:10px;color:var(--sb-m);margin-top:3px;font-family:var(--mono);}
.nav-sec{padding:10px 6px 4px;}
.nav-lbl{font-size:9px;color:var(--sb-m);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:5px;}
.nav-item{display:flex;align-items:flex-start;gap:8px;padding:8px 8px;border-radius:6px;cursor:pointer;font-size:11.5px;color:var(--sb-t);transition:background .12s;user-select:none;line-height:1.4;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:rgba(255,255,255,.10);color:#f1f5f9;font-weight:600;}
.nav-item.active .nav-org{color:#f1f5f9;}
.nav-item.active .nav-name{color:#94a3b8;}
.nav-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.nav-name{display:block;font-size:10px;color:var(--sb-m);margin-top:1px;font-weight:400;}
.nav-org{display:block;font-size:12px;font-weight:600;color:var(--sb-t);}
.nav-div{height:1px;background:rgba(255,255,255,.07);margin:6px 14px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.topbar-t{font-size:14.5px;font-weight:600;letter-spacing:-.3px;}
.topbar-s{font-size:11px;color:var(--t3);margin-top:2px;}
.topbar-r{display:flex;align-items:center;gap:8px;}
.new-pill{background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:2px 8px;font-family:var(--mono);display:none;}
.new-pill.on{display:inline-block;}
.upd-time{font-size:10px;color:var(--t3);font-family:var(--mono);}
.srch{position:relative;}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none;}
.srch input{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:5px 9px 5px 26px;font-size:12px;font-family:var(--font);color:var(--t);outline:none;width:190px;transition:border-color .15s;}
.srch input:focus{border-color:var(--blue);}
.srch input::placeholder{color:var(--t3);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:18px 22px 48px;}
.feed-wide{display:flex;flex-direction:column;gap:14px;}
.feed-2col{display:flex;flex-direction:column;gap:14px;}
.feed-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.feed-2col-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

/* ── SOURCE CARD ── */
.src-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
.card-hd{padding:10px 13px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.card-hd-left{display:flex;align-items:center;gap:8px;min-width:0;}
.card-name{font-size:12.5px;font-weight:600;color:var(--t);letter-spacing:-.2px;}
.card-org{display:inline-block;font-size:10.5px;margin-top:5px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:-.1px;}
.org-molit{background:#ede9fe;color:#5b21b6;}
.org-seoul{background:#cffafe;color:#0e7490;}
.org-urban{background:#fef3c7;color:#92400e;}
.org-krihs{background:#dbeafe;color:#1e40af;}
.org-nars{background:#fee2e2;color:#991b1b;}
.org-smc{background:#d1fae5;color:#065f46;}
.org-law{background:#f1f5f9;color:#334155;}
.org-default{background:var(--bg3);color:var(--t2);}
.card-go{font-size:11px;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap;}
.card-go:hover{opacity:.7;}
.card-go svg{width:10px;height:10px;}

/* ── POST LIST ── */
.card-body{flex:1;overflow-y:auto;max-height:360px;}
.post-row{display:flex;flex-direction:column;gap:3px;padding:7px 13px;border-bottom:1px solid var(--bd);transition:background .1s;}
.post-row:last-child{border-bottom:none;}
.post-row:hover{background:var(--bg3);}
.post-row-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge-new{font-size:9px;padding:1px 5px;background:#fff0f0;color:#e53e3e;border:1px solid #fed7d7;border-radius:3px;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.post-date{font-size:10px;color:var(--t3);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.post-dept{font-size:10px;font-weight:600;border-radius:3px;padding:1px 6px;white-space:nowrap;flex-shrink:0;border:1px solid transparent;}
.dept-미래공간{background:#f7f5fc;color:#5a4e7a;border-color:#d8d0f0;}
.dept-균형발전{background:#f3f8f4;color:#3d5c42;border-color:#bdd8c2;}
.dept-도시공간{background:#f3f7fb;color:#374f6b;border-color:#bdd0e4;}
.dept-주택{background:#fbf7f2;color:#6b4e2e;border-color:#e4cdb0;}
.dept-default{background:#f8fafc;color:#475569;border-color:#e2e8f0;}
.gu-a{background:#f7f5fc;color:#5a4e7a;border-color:#d8d0f0;}
.gu-b{background:#f3f8f4;color:#3d5c42;border-color:#bdd8c2;}
.gu-c{background:#f3f7fb;color:#374f6b;border-color:#bdd0e4;}
.gu-d{background:#fbf7f2;color:#6b4e2e;border-color:#e4cdb0;}
.gu-e{background:#f8f5fb;color:#5c4a6e;border-color:#d4c4e4;}
.post-a{font-size:12px;color:var(--t);text-decoration:none;line-height:1.45;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.post-a:hover{color:var(--blue);}
.card-msg{padding:18px 13px;font-size:12px;color:var(--t3);text-align:center;line-height:1.6;}
.post-notice-no{font-size:10px;color:var(--t3);font-family:var(--mono);white-space:nowrap;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;max-width:160px;}

/* ── 카드 내부 필터 탭 ── */
.card-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:10px 13px;border-bottom:1px solid var(--bd);}
.tab-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--font);white-space:nowrap;font-weight:500;}
.tab-btn:hover{background:var(--bg3);color:var(--t);}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}

/* ── 권역·자치구 탭 ── */
.region-tabs{display:flex;gap:4px;padding:8px 10px 0;}
.region-tab{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px 6px 0 0;border:1px solid var(--bd);border-bottom:none;background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .12s;font-family:var(--font);white-space:nowrap;}
.region-tab:hover{background:var(--bg4);color:var(--t);}
.region-tab.active{background:var(--bg2);color:var(--blue);border-color:var(--bd2);font-weight:700;}
.gu-tabs{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;padding:7px 10px;border-bottom:1px solid var(--bd);background:var(--bg3);}
.gu-tab{font-size:11px;font-weight:500;padding:3px 2px;text-align:center;border-radius:4px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;transition:all .12s;font-family:var(--font);}
.gu-tab:hover{background:var(--bg4);color:var(--t);}
.gu-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.post-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.post-grid .post-row{border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);}
.post-grid .post-row:nth-child(even){border-right:none;}
.post-grid .post-row:nth-last-child(-n+2){border-bottom:none;}
.wrtanc-dday{font-size:10px;white-space:nowrap;flex-shrink:0;font-family:var(--mono);}

/* ── STATIC CARD ── */
.static-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;padding:10px 13px;}
.static-item{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:8px 10px;}
.si-cat{font-size:9px;color:var(--blue);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono);}
.si-title{font-size:11px;color:var(--t);font-weight:500;line-height:1.4;}
.si-desc{font-size:10px;color:var(--t2);margin-top:2px;line-height:1.4;}
.static-note{padding:0 13px 10px;font-size:10.5px;color:var(--t3);font-style:italic;line-height:1.5;}

/* ── COPYRIGHT ── */
.copyright{padding:14px;margin-top:auto;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:var(--sb-m);line-height:1.6;flex-shrink:0;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>

function orgClass(org){
  if(org.includes("국토교통부")) return "org-molit";
  if(org.includes("서울특별시")) return "org-seoul";
  if(org.includes("도시계획포털")) return "org-urban";
  if(org.includes("국토연구원")) return "org-krihs";
  if(org.includes("국회입법조사처")) return "org-nars";
  if(org.includes("서울시의회")) return "org-smc";
  return "org-law";
}

function deptClass(dept){
  if(!dept) return 'dept-default';
  if(["미래공간담당관","공공개발담당관","용산입체도시담당관","도시활력담당관"].some(d=>dept.includes(d))) return 'dept-미래공간';
  if(["균형발전기획관","균형발전정책과","도시정비과","동남권사업과","동북권사업과","서부권사업과","광화문광장사업과"].some(d=>dept.includes(d))) return 'dept-균형발전';
  if(["도시공간기획관","도시공간전략과","도시계획과","도시계획상임기획과","도시재창조과","신속통합기획과","도시관리과","시설계획과","토지관리과"].some(d=>dept.includes(d))) return 'dept-도시공간';
  if(["주택정책관","건축기획관","주택정책과","임대주택과","부동산정책개발센터","공공주택과","주거환경개선과","건축기획과","전략주택공급과","공동주택과","주거정비과","재정비촉진과"].some(d=>dept.includes(d))) return 'dept-주택';
  return 'dept-default';
}

function calcDday(s){
  if(!s) return '';
  const end=new Date(s.replace(/\./g,'-'));
  if(isNaN(end)) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=Math.round((end-today)/86400000);
  if(d<0) return `<span style="color:var(--t3)">종료</span>`;
  if(d===0) return `<span style="color:var(--red);font-weight:600">D-Day</span>`;
  return `<span style="color:var(--amber);font-weight:500">D-${d}</span>`;
}

async function loadUpdates(){
  if(updData) return updData;
  try{
    const r=await fetch("data/updates.json?t="+Date.now());
    if(!r.ok) throw new Error("HTTP "+r.status);
    updData=await r.json();
    let n=0;
    Object.values(updData.sources).forEach(s=>{
      (Array.isArray(s.items)?s.items:Array.isArray(s.all)?s.all:[]).forEach(i=>{if(i.is_new)n++;});
    });
    if(n>0){const el=document.getElementById("newPill");el.textContent=n+" NEW";el.classList.add("on");}
    const d=new Date(updData.updated_at);
    document.getElementById("updTime").textContent="업데이트 "+d.toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
    return updData;
  }catch(e){return null;}
}

function makeHd(name,org,url,label="원문"){
  return `<div class="card-hd"><div class="card-hd-left"><div><div class="card-name">${name}</div><div class="card-org ${orgClass(org)}">${org}</div></div></div><a class="card-go" href="${url}" target="_blank" rel="noopener">${label} ${goSvg()}</a></div>`;
}

function postRows(items, q, limit=12){
  if(!items||!items.length) return `<div class="card-msg">수집된 항목이 없습니다.</div>`;
  const f=q?items.filter(i=>i.title.toLowerCase().includes(q)):items;
  if(!f.length) return `<div class="card-msg">검색 결과가 없습니다.</div>`;
  return f.slice(0,limit).map(item=>{
    const badge=item.is_new?`<span class="badge-new">NEW</span>`:'';
    const date=item.date?`<span class="post-date">${item.date.slice(0,10)}</span>`:'';
    const dept=item.dept?`<span class="post-dept ${deptClass(item.dept)}">${item.dept}</span>`:'';
    return`<div class="post-row"><div class="post-row-meta">${badge}${date}${dept}</div><a class="post-a" href="${item.url}" target="_blank" rel="noopener" title="${item.title}">${item.title}</a></div>`;
  }).join('');
}

function renderPress(data){
  const wrap=document.createElement('div'); wrap.className='feed-wide';

  const c2=document.createElement('div'); c2.className='src-card';

  c2.innerHTML=makeHd("보도자료","서울특별시","https://www.seoul.go.kr/news/news_report.do")
    +`<div class="card-tabs" id="st-${uid}">${tabsHtml}</div><div class="card-body" id="sb-${uid}"></div>`;
  const body=c2.querySelector(`#sb-${uid}`);
  const stabs=c2.querySelectorAll(`#st-${uid} .tab-btn`);
  const q=searchQ.trim().toLowerCase();
  const renderG=(gi)=>{
    if(!data){body.innerHTML=`<div class="card-msg">⚠ data/updates.json이 없습니다.</div>`;return;}
    const s=data.sources["seoul_press"];
    if(!s||!s.items.length){body.innerHTML=`<div class="card-msg">수집된 항목이 없습니다.</div>`;return;}
    const g=SEOUL_GROUPS[gi];
    const f=g.depts?s.items.filter(i=>g.depts.some(d=>i.dept&&i.dept.includes(d))):s.items;
    body.innerHTML=postRows(f,q,15);
  };
  stabs.forEach((b,i)=>b.addEventListener('click',()=>{stabs.forEach(x=>x.classList.remove('active'));b.classList.add('active');renderG(i);}));
  renderG(0);
  wrap.appendChild(c2);

  const c1=document.createElement('div'); c1.className='src-card';
  const tabs=MOLIT_TABS.map(t=>`<a class="tab-btn" href="${t.url}" target="_blank" rel="noopener">${t.label}</a>`).join('');
  c1.innerHTML=makeHd("보도자료 / 홍보자료","국토교통부","https://www.molit.go.kr/USR/NEWS/m_71/lst.jsp","바로가기")
    +`<div class="card-tabs">${tabs}</div>`
    +`<div class="card-msg" style="text-align:left;color:var(--t2);padding:14px 13px;">분야 탭을 클릭하면 해당 페이지로 바로 이동합니다.<br><span style="font-size:11px;color:var(--t3)">※ robots.txt 제한으로 자동 크롤링 불가</span></div>`;
  wrap.appendChild(c1);

  return wrap;
}

function buildRegionCard(card, hd, listUrl, sid, getItems){
  const uid=`${sid}-${Date.now()}`;
  const rHtml=REGIONS.map((r,i)=>`<button class="region-tab${i===0?' active':''}" data-ri="${i}">${r.label}</button>`).join('');
  card.innerHTML=hd+`<div class="region-tabs" id="rt-${uid}">${rHtml}</div><div class="gu-tabs" id="gt-${uid}"></div><div class="card-body post-grid" id="bd-${uid}"></div>`;
  const rTabs=card.querySelectorAll(`#rt-${uid} .region-tab`);
  const gDiv=card.querySelector(`#gt-${uid}`);
  const body=card.querySelector(`#bd-${uid}`);
  let curR=0, curG=null;
  const drawBody=()=>{
    const items=getItems(curG);
    if(items===null){body.innerHTML=`<div class="card-msg" style="grid-column:1/-1">⚠ data/updates.json이 없습니다.</div>`;return;}
    const region=REGIONS[curR]; let f=items;
    if(curG===null&&region.gus) f=items.filter(i=>region.gus.includes(i.gu));
    const q=searchQ.trim().toLowerCase(); if(q) f=f.filter(i=>i.title.toLowerCase().includes(q));
    if(!f.length){body.innerHTML=`<div class="card-msg" style="grid-column:1/-1">해당 항목이 없습니다.</div>`;return;}
    body.innerHTML=f.slice(0,20).map(item=>{
      const badge=item.is_new?`<span class="badge-new">NEW</span>`:'';
      const date=item.date?`<span class="post-date">${item.date.slice(0,10)}</span>`:'';
      const gu=item.gu?`<span class="post-dept ${GU_COLOR[item.gu]||'dept-default'}">${item.gu}</span>`:'';
      const dday=item.end_date?`<span class="wrtanc-dday">${calcDday(item.end_date)}</span>`:'';
      const noticeNo=item.notice_no?`<span class="post-notice-no">${item.notice_no}</span>`:'';
      return`<div class="post-row">
        <div class="post-row-meta">${badge}${date}${gu}${dday}${noticeNo}</div>
        <a class="post-a" href="${listUrl}" target="_blank" rel="noopener" title="${item.title}&#10;※ 목록에서 공고명으로 검색하세요">${item.title}</a>
      </div>`;
    }).join('');
  };
  const drawGuTabs=()=>{
    const region=REGIONS[curR]; if(!region.gus){gDiv.innerHTML='';return;}
    gDiv.innerHTML=[`<button class="gu-tab${curG===null?' active':''}" data-gu="">전체</button>`]
      .concat(region.gus.map(g=>`<button class="gu-tab${curG===g?' active':''}" data-gu="${g}">${g}</button>`)).join('');
    gDiv.querySelectorAll('.gu-tab').forEach(b=>b.addEventListener('click',()=>{
      curG=b.dataset.gu||null;
      gDiv.querySelectorAll('.gu-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');drawBody();
    }));
  };
  rTabs.forEach((b,i)=>b.addEventListener('click',()=>{
    curR=i;curG=null;rTabs.forEach(x=>x.classList.remove('active'));b.classList.add('active');drawGuTabs();drawBody();
  }));
  loadUpdates().then(()=>{drawGuTabs();drawBody();});
}

function renderUrban(data){
  const wrap=document.createElement('div'); wrap.className='feed-wide';

  const w1=document.createElement('div'); w1.className='src-card';
  buildRegionCard(w1,
    makeHd("열람공고(안)","서울 도시계획포털","https://urban.seoul.go.kr/view/html/PMNU4010100001?searchGubun=ing"),
    "https://urban.seoul.go.kr/view/html/PMNU4010100001?searchGubun=ing",
    "wrtanc",
    guName=>{
      const ws=updData&&updData.sources["wrtanc"]; if(!ws) return null;
      if(!guName){const seen=new Set();return Object.values(ws.by_gu||{}).flat().filter(i=>{if(seen.has(i.url))return false;seen.add(i.url);return true;});}
      const code=SGG_CODE[guName]; return(ws.by_gu&&code&&ws.by_gu[code])||[];
    }
  );
  wrap.appendChild(w1);

  const w2=document.createElement('div'); w2.className='src-card';
  buildRegionCard(w2,
    makeHd("결정고시(안)","서울 도시계획포털","https://urban.seoul.go.kr/view/html/PMNU4030100001"),
    "https://urban.seoul.go.kr/view/html/PMNU4030100001",
    "ntfc",
    guName=>{
      const ws=updData&&updData.sources["ntfc"]; if(!ws) return null;
      const items=ws.items||[]; return guName?items.filter(i=>i.gu===guName):items;
    }
  );
  wrap.appendChild(w2);

  return wrap;
}

function renderResearch(data){
  const wrap=document.createElement('div'); wrap.className='feed-2col-grid';
  const q=searchQ.trim().toLowerCase();
  const sources=[
    {sid:"upmu",          name:"업무자료 (법정계획/운영지침)", org:"서울 도시계획포털",  url:"https://urban.seoul.go.kr/view/html/PMNU5020000001"},
    {sid:"krihs_brief",   name:"국토정책 Brief",              org:"국토연구원",          url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103050000&pub_kind=BR_1"},
    {sid:"krihs_working", name:"워킹페이퍼",                  org:"국토연구원",          url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103090000&pub_kind=WKP"},
    {sid:"krihs_article", name:"월간국토 Article",            org:"국토연구원",          url:"https://www.krihs.re.kr/krihsLibraryArticle/articleList.es?mid=a10103010000&pub_kind=1"},
    {sid:"nars_report",   name:"연구보고서",                  org:"국회입법조사처",      url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0043"},
    {sid:"nars_research", name:"정책연구용역",                org:"국회입법조사처",      url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0010"},
  ];
  sources.forEach(src=>{
    const card=document.createElement('div'); card.className='src-card';
    const s=data&&data.sources[src.sid];
    card.innerHTML=makeHd(src.name, src.org, src.url);
    const body=document.createElement('div'); body.className='card-body';
    const needsDetail=src.sid.startsWith('nars_')||src.sid.startsWith('krihs_');
    if(needsDetail){
      const items=s&&s.items;
      if(!items||!items.length){body.innerHTML=`<div class="card-msg">수집된 항목이 없습니다.</div>`;}
      else{
        const f=q?items.filter(i=>i.title.toLowerCase().includes(q)):items;
        body.innerHTML=f.slice(0,12).map(item=>{
          const badge=item.is_new?`<span class="badge-new">NEW</span>`:'';
          const date=item.date?`<span class="post-date">${item.date.slice(0,10)}</span>`:'';
          const detail=`<a class="card-go" href="${item.url}" target="_blank" rel="noopener" title="상세 페이지 (목록 접속 후 열기)" style="margin-left:auto;flex-shrink:0;">상세${goSvg()}</a>`;
          return`<div class="post-row">
            <div class="post-row-meta">${badge}${date}${detail}</div>
            <a class="post-a" href="${src.url}" target="_blank" rel="noopener" title="${item.title}">${item.title}</a>
          </div>`;
        }).join('');
      }
    } else {
      body.innerHTML=postRows(s&&s.items, q);
    }
    card.appendChild(body); wrap.appendChild(card);
  });
  return wrap;
}

      <div class="static-item"><div class="si-cat">보고서</div><div class="si-title">검토·심사보고서 PDF</div><div class="si-desc">의안 상세 하단 첨부</div></div>

function renderLaw(){
  const wrap=document.createElement('div'); wrap.className='feed-wide';
  const card=document.createElement('div'); card.className='src-card';
  card.innerHTML=makeHd("법령·시행령·시행규칙·조례","국가법령정보센터","https://www.law.go.kr/main.html","바로가기")

      <div class="static-item"><div class="si-cat">행정규칙</div><div class="si-title">훈령·예규·고시</div><div class="si-desc">각 부처 행정규칙 원문</div></div>
      <div class="static-item"><div class="si-cat">판례</div><div class="si-title">헌재·대법원</div><div class="si-desc">법령 관련 주요 판례</div></div>
    </div><div class="static-note">※ 파일 아닌 링크로 관리</div>`;

async function render(){
  const content=document.getElementById('content');
  content.innerHTML='';
  const data=await loadUpdates();
  let el;
  switch(activeTab){
    case 'press':    el=renderPress(data); break;
    case 'urban':    el=renderUrban(data); break;
    case 'research': el=renderResearch(data); break;
    case 'smc':      el=renderSmc(); break;
    case 'law':      el=renderLaw(); break;
    default: el=document.createElement('div');
  }
  content.appendChild(el);
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-item[data-tab]').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const m=TAB_META[tab]||{};
  document.getElementById('topTitle').textContent=m.title||'';
  document.getElementById('topSub').textContent=m.sub||'';
  render();
}

document.querySelectorAll('.nav-item[data-tab]').forEach(el=>el.addEventListener('click',()=>setTab(el.dataset.tab)));
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value;render();});

render();
</script>
