<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --mono:"D2Coding","Consolas","Courier New",monospace;
  --bg:#f7f8fa;--bg2:#fff;--bg3:#f2f4f7;
  --bd:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.13);
  --t:#111827;--t2:#4b5563;--t3:#9ca3af;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-bd:#bfdbfe;
  --amber:#d97706;--red:#dc2626;
  --sb:#1e2433;--sb-t:#cbd5e1;--sb-m:#64748b;
}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden;}
aside{width:188px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.brand-t{font-size:13px;font-weight:600;color:#f1f5f9;letter-spacing:-.2px;}
.brand-s{font-size:10px;color:var(--sb-m);margin-top:2px;font-family:var(--mono);}
.nav-sec{padding:14px 8px 4px;}
.nav-lbl{font-size:9.5px;color:var(--sb-m);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sb-t);transition:background .12s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:rgba(255,255,255,.09);color:#f1f5f9;font-weight:500;}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-ext{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;font-size:11.5px;color:var(--sb-m);text-decoration:none;transition:color .12s,background .12s;}
.nav-ext:hover{color:var(--sb-t);background:rgba(255,255,255,.05);}
.nav-ext-arr{font-size:10px;margin-left:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10;}
.topbar-t{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.topbar-s{font-size:11px;color:var(--t3);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.update-status{font-size:11px;color:var(--t3);font-family:var(--mono);white-space:nowrap;}
.new-badge{display:inline-block;background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:1px 7px;font-family:var(--mono);margin-left:5px;vertical-align:middle;}
.srch{position:relative;}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none;}
.srch input{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px 6px 28px;font-size:12px;font-family:var(--font);color:var(--t);outline:none;width:200px;transition:border-color .15s;}
.srch input:focus{border-color:var(--blue);}
.srch input::placeholder{color:var(--t3);}
.content{flex:1;overflow-y:auto;padding:20px 24px 48px;position:relative;z-index:1;}
.sec-block{margin-bottom:24px;}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-acc{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.sec-name{font-size:13px;font-weight:600;letter-spacing:-.2px;}
.sec-cnt{font-size:11px;color:var(--t3);}
.list-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.col-hd{display:grid;grid-template-columns:18% 27% 31% 1fr;padding:7px 16px;background:var(--bg3);border-bottom:1px solid var(--bd);}
.col-hd span{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.3px;text-transform:uppercase;}
.col-hd span:last-child{text-align:right;}
.row-group:not(:last-child){border-bottom:1px solid var(--bd);}
.data-row{display:grid;grid-template-columns:18% 27% 31% 1fr;align-items:center;padding:11px 16px;cursor:pointer;transition:background .1s;min-height:46px;}
.data-row:hover{background:var(--bg3);}
.data-row.open{background:var(--blue-lt);}
.col-org{font-size:12.5px;font-weight:600;color:var(--t);padding-right:12px;display:flex;align-items:center;gap:6px;}
.col-titles{display:flex;flex-wrap:wrap;gap:4px;padding-right:12px;}
.chip{font-size:11px;padding:2px 8px;border:1px solid var(--bd2);border-radius:4px;color:var(--t2);background:var(--bg3);white-space:nowrap;}
.col-folder{font-family:var(--mono);font-size:10.5px;color:var(--t3);padding-right:12px;line-height:1.7;}
.star{color:var(--amber);}
.nosave{color:var(--red);font-style:italic;}
.col-link{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.go-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--blue);text-decoration:none;white-space:nowrap;}
.go-btn:hover{opacity:.65;}
.go-btn svg{width:11px;height:11px;}
.chev{font-size:11px;color:var(--t3);transition:transform .2s;}
.open .chev{transform:rotate(180deg);}
.new-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;}
.live-panel{display:none;background:var(--blue-lt);border-top:1px solid var(--blue-bd);padding:14px 16px 16px;}
.live-panel.visible{display:block;}
.live-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.live-source{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.7px;font-family:var(--mono);}
.live-crawled{font-size:10px;color:var(--t3);font-family:var(--mono);}
.live-item{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid var(--blue-bd);}
.live-item:last-child{border-bottom:none;}
.live-new{font-size:9px;padding:1px 5px;border-radius:3px;background:#fef2f2;color:var(--red);border:1px solid #fecaca;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.live-date{font-size:10.5px;color:var(--t3);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.live-link{font-size:12.5px;color:var(--blue);text-decoration:none;line-height:1.4;flex:1;}
.live-link:hover{text-decoration:underline;}
.live-msg{font-size:12px;color:var(--t3);padding:14px 0;text-align:center;}
.live-more{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:11.5px;color:var(--blue);text-decoration:none;}
.live-more:hover{text-decoration:underline;}
.acc-정책기본구상{background:#2563eb;}.acc-지자체정책구상{background:#0d9488;}.acc-사업계획안{background:#d97706;}.acc-각종법령{background:#dc2626;}
.dot-정책기본구상{background:#2563eb;}.dot-지자체정책구상{background:#0d9488;}.dot-사업계획안{background:#d97706;}.dot-각종법령{background:#dc2626;}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>

      </div>

  </div>

</div>
<script>
const URL_TO_SID={
  "https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103050000&pub_kind=BR_1":"krihs_brief",
  "https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103090000&pub_kind=WKP":"krihs_working",

  "https://www.nars.go.kr/report/list.do?cmsCode=CM0010":"nars_research",
};
const DATA=[
  {cat:"정책기본구상",sub:"국회",org:"국토교통위원회",titles:["국토교통위 소관 의안","심사보고서","검토보고서"],folder:"★사업별 자료 - 법령/지침",url:"https://ltc.na.go.kr/cmmit/bill/cntsBill/list.do?menuNo=2000079"},
  {cat:"정책기본구상",sub:"국회",org:"국회입법조사처",titles:["국토해양팀 소관 연구보고서"],folder:"★사업별 자료 - 법령/지침",url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0043"},
  {cat:"정책기본구상",sub:"국회",org:"국회입법조사처",titles:["국토해양팀 소관 정책연구용역"],folder:"★사업별 자료 - 법령/지침",url:"https://www.nars.go.kr/report/list.do?cmsCode=CM0010"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",titles:["국토정책 Brief"],folder:"★사업별 자료 - 정책/연구",url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103050000&pub_kind=BR_1"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",titles:["워킹페이퍼"],folder:"★사업별 자료 - 정책/연구",url:"https://www.krihs.re.kr/krihsLibraryReport/briefList.es?mid=a10103090000&pub_kind=WKP"},
  {cat:"정책기본구상",sub:"국토연구원",org:"국토연구원",titles:["월간국토 Article"],folder:"★사업별 자료 - 정책/연구",url:"https://www.krihs.re.kr/krihsLibraryArticle/articleList.es?mid=a10103010000&pub_kind=1"},
  {cat:"정책기본구상",sub:"국토교통부",org:"국토교통부",titles:["정책발표용 홍보자료","보도자료 (국토도시)"],folder:"★사업별 자료 - 정책/연구",url:"https://www.molit.go.kr/USR/NEWS/m_71/lst.jsp"},
  {cat:"정책기본구상",sub:"국토교통부",org:"국토교통부",titles:["정책정보 (국토도시)"],folder:"★사업별 자료 - 정책/연구",url:"https://www.molit.go.kr/USR/policyData/m_34681/lst.jsp"},
  {cat:"지자체정책구상",sub:"서울특별시",org:"미래공간기획관·균형발전본부·도시공간본부·주택실",titles:["정책발표용 홍보자료","보도자료"],folder:"★사업별 자료 - 정책/연구",url:"https://www.seoul.go.kr/news/news_report.do"},
  {cat:"지자체정책구상",sub:"서울특별시",org:"미래공간기획관·균형발전본부·도시공간본부·주택실",titles:["법률에 따른 기본계획","사업별 운영지침 등"],folder:"★사업별 자료 - 상위계획",url:"https://urban.seoul.go.kr/view/html/PMNU5020000001"},
  {cat:"지자체정책구상",sub:"서울시의회",org:"주택공간위원회",titles:["주택공간위원회 소관 의안","심사보고서","검토보고서"],folder:"★사업별 자료 - 법령/지침",url:"https://www.smc.seoul.kr/info/index.do?menuId=001003008"},
  {cat:"지자체정책구상",sub:"서울시의회",org:"도시계획균형위원회",titles:["도시계획균형위원회 소관 의안","심사보고서","검토보고서"],folder:"★사업별 자료 - 법령/지침",url:"https://www.smc.seoul.kr/info/index.do?menuId=001003008"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",titles:["열람공고(안)"],folder:"★사업별 자료 - 참고사례",url:"https://urban.seoul.go.kr/view/html/PMNU4010000001"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",titles:["결정고시(안)"],folder:"★사업별 자료 - 참고사례",url:"https://urban.seoul.go.kr/view/html/PMNU4030100001"},
  {cat:"사업계획안",sub:"서울특별시",org:"서울특별시",titles:["위원회 심의 결과"],folder:"저장 X",url:"https://commission.eseoul.go.kr/"},
  {cat:"각종법령",sub:"각종법령",org:"국가법령정보센터",titles:["법, 시행령, 시행규칙, 조례 등"],folder:"★사업별 자료 - 법령/지침 (파일 아닌 링크로 저장)",url:"https://www.law.go.kr/main.html"},
];
const CAT_LABELS={정책기본구상:"정책기본구상",지자체정책구상:"지자체정책구상",사업계획안:"사업계획(안)",각종법령:"각종 법령"};
const CAT_SUBS={정책기본구상:"국회 · 국토연구원 · 국토교통부",지자체정책구상:"서울특별시 · 서울시의회",사업계획안:"서울특별시",각종법령:"국가법령정보센터"};
let activeCat="정책기본구상",searchQ="",updatesData=null;

async function loadUpdates(){
  try{
    const res=await fetch("data/updates.json?t="+Date.now());
    if(!res.ok)throw new Error();
    updatesData=await res.json();
    let n=0;
    Object.values(updatesData.sources).forEach(s=>s.items.forEach(i=>{if(i.is_new)n++;}));
    const kst=new Date(updatesData.updated_at);
    const ds=kst.toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"})+" "+kst.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("updateStatus").innerHTML=`업데이트 ${ds}${n>0?`<span class="new-badge">NEW ${n}</span>`:""}`;
  }catch(e){
    document.getElementById("updateStatus").textContent="업데이트 데이터 없음";
  }
}

function buildLiveHTML(sid,listUrl){
  if(!updatesData)return null;
  const src=updatesData.sources[sid];
  if(!src||!src.items.length)return null;
  const rows=src.items.map(i=>{
    const nb=i.is_new?`<span class="live-new">NEW</span>`:"";
    const dt=i.date?`<span class="live-date">${i.date}</span>`:"";
    return `<div class="live-item">${nb}${dt}<a class="live-link" href="${i.url}" target="_blank" rel="noopener">${i.title}</a></div>`;
  }).join("");
  return `<div class="live-hd"><span class="live-source">${src.org} · ${src.name}</span><span class="live-crawled">수집일 ${src.crawled_at}</span></div><div>${rows}</div><a class="live-more" href="${listUrl}" target="_blank" rel="noopener">전체 목록 보기 ↗</a>`;
}

function fmt(f){return f.replace(/★/g,'<span class="star">★</span>').replace(/저장 X/g,'<span class="nosave">저장 X</span>');}
function goBtn(url){if(!url)return"";return`<a class="go-btn" href="${url}" target="_blank" rel="noopener">바로가기<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2M5 2h5v5"/></svg></a>`;}
function match(s,q){return s.toLowerCase().indexOf(q)!==-1;}

function render(){
  const content=document.getElementById("content");
  const q=searchQ.trim().toLowerCase();
  const filtered=DATA.filter(d=>{
    const catOk=q?true:d.cat===activeCat;
    const qOk=!q||match(d.org,q)||d.titles.some(t=>match(t,q))||match(d.sub,q)||match(d.folder,q);
    return catOk&&qOk;
  });
  const bySub={};
  filtered.forEach(d=>{const k=q?`[${CAT_LABELS[d.cat]}] ${d.sub}`:d.sub;(bySub[k]=bySub[k]||[]).push(d);});
  content.innerHTML="";
  if(!filtered.length){content.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}

  Object.entries(bySub).forEach(([sub,items])=>{
    const repCat=items[0].cat;
    const block=document.createElement("div");
    block.className="sec-block";
    const hd=document.createElement("div");
    hd.className="sec-hd";
    hd.innerHTML=`<span class="sec-acc acc-${repCat}"></span><span class="sec-name">${sub}</span><span class="sec-cnt">${items.length}건</span>`;
    block.appendChild(hd);
    const lw=document.createElement("div");
    lw.className="list-wrap";
    lw.innerHTML='<div class="col-hd"><span>기관</span><span>자료명</span><span>폴더 체계</span><span>바로가기</span></div>';

    const byOrg=new Map();
    items.forEach(d=>{if(!byOrg.has(d.org))byOrg.set(d.org,[]);byOrg.get(d.org).push(d);});

    byOrg.forEach((rows,org)=>{
      rows.forEach((d,ri)=>{
        const sid=URL_TO_SID[d.url]||null;
        const hasNew=sid&&updatesData&&updatesData.sources[sid]&&updatesData.sources[sid].items.some(i=>i.is_new);
        const rg=document.createElement("div");
        rg.className="row-group";
        const dr=document.createElement("div");
        dr.className="data-row";
        const orgHtml=ri===0?`<div class="col-org">${org}${hasNew?'<span class="new-dot"></span>':''}</div>`:`<div class="col-org"></div>`;
        dr.innerHTML=orgHtml
          +`<div class="col-titles">${d.titles.map(t=>`<span class="chip">${t}</span>`).join("")}</div>`
          +`<div class="col-folder">${fmt(d.folder)}</div>`
          +`<div class="col-link">${goBtn(d.url)}${sid?'<span class="chev">▾</span>':''}</div>`;
        rg.appendChild(dr);

        if(sid){
          const lp=document.createElement("div");
          lp.className="live-panel";
          dr.addEventListener("click",function(e){
            if(e.target.tagName==="A")return;
            const isOpen=dr.classList.toggle("open");
            lp.classList.toggle("visible",isOpen);
            if(isOpen&&!lp.dataset.loaded){
              lp.dataset.loaded="1";
              const fill=()=>{const html=buildLiveHTML(sid,d.url);lp.innerHTML=html||'<div class="live-msg">수집된 항목이 없습니다. GitHub Actions를 먼저 실행해주세요.</div>';};
              if(updatesData)fill();
              else{lp.innerHTML='<div class="live-msg">로딩 중…</div>';const t=setInterval(()=>{if(updatesData){clearInterval(t);fill();}},300);}
            }
          });
          rg.appendChild(lp);
        }
        lw.appendChild(rg);
      });
    });

    block.appendChild(lw);
    content.appendChild(block);
  });
}

function setActiveCat(cat){
  activeCat=cat;
  document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.classList.toggle("active",el.dataset.cat===cat));
  document.getElementById("topTitle").textContent=CAT_LABELS[cat]||cat;
  document.getElementById("topSub").textContent=CAT_SUBS[cat]||"";
  render();
}
document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.addEventListener("click",()=>setActiveCat(el.dataset.cat)));
document.getElementById("searchInput").addEventListener("input",e=>{searchQ=e.target.value;render();});
loadUpdates().then(()=>render());
</script>
</body>
</html>
