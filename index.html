<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f0f4fb;
  color: #1a2540;
  margin: 0;
}

/* HEADER */
header {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-title {
  font-weight: 600;
}

.count-pill {
  font-size: 12px;
  color: #666;
}

/* CONTROLS */
.controls {
  padding: 12px 24px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.search-input {
  width: 300px;
  padding: 8px;
  font-size: 13px;
}

/* MAIN */
main {
  padding: 20px;
}

/* CARD */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 14px;
}

.card-org {
  font-weight: 600;
}

.title-chip {
  background: #eee;
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 11px;
  margin: 2px;
  display: inline-block;
}

.card-folder {
  font-size: 11px;
  color: #666;
}

.link-btn {
  margin-top: 8px;
  display: inline-block;
  background: #1a5ccc;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <div class="logo-title">정책 자료 대시보드</div>
  <div class="count-pill">표시 <b id="visCount">0</b></div>
</header>

<div class="controls">
  <input id="searchInput" class="search-input" placeholder="검색...">
</div>

<main id="main"></main>

<script>
const DATA = [
  { org:"국토교통위원회", title:"의안", folder:"법령", url:"https://ltc.na.go.kr" },
  { org:"국토연구원", title:"연구보고서", folder:"정책", url:"https://www.krihs.re.kr" },
  { org:"서울특별시", title:"보도자료", folder:"정책", url:"https://www.seoul.go.kr" },
];

let searchQ = "";

function render() {
  const main = document.getElementById("main");
  const filtered = DATA.filter(d =>
    !searchQ || d.title.includes(searchQ) || d.org.includes(searchQ)
  );

  document.getElementById("visCount").textContent = filtered.length;

  main.innerHTML = `
    <div class="cards-grid">
      ${filtered.map(d => `
        <div class="card">
          <div class="card-org">${d.org}</div>
          <div class="title-chip">${d.title}</div>
          <div class="card-folder">${d.folder}</div>
          <a class="link-btn" href="${d.url}" target="_blank">바로가기</a>
        </div>
      `).join("")}
    </div>
  `;
}

document.getElementById("searchInput").oninput = e => {
  searchQ = e.target.value;
  render();
};

render();
</script>

</body>
</html>
