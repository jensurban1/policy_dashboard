<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f0f4fb; --bg2:#fff; --bg3:#e8eef8;
  --border:#c8d5ea; --text:#1a2540; --text2:#4a5a7a;
  --accent:#1a5ccc;
}

body { font-family:'Noto Sans KR'; background:var(--bg); margin:0; color:var(--text); }

header {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; justify-content:space-between;
}

.controls { padding:12px 24px; background:#fff; border-bottom:1px solid var(--border); }
.pill {
  padding:4px 10px; border:1px solid var(--border);
  border-radius:20px; cursor:pointer; font-size:12px;
}
.pill.active { background:var(--accent); color:#fff; }

.search { margin-bottom:10px; padding:6px; width:200px; }

main { padding:20px; }

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}

.card {
  background:#fff; border:1px solid var(--border);
  border-radius:10px; padding:14px;
}

.card-org { font-weight:600; }
.card-folder { font-size:11px; color:var(--text2); }

.btn {
  display:inline-block; margin-top:8px;
  background:var(--accent); color:#fff;
  padding:6px 10px; border-radius:6px;
  text-decoration:none; font-size:12px;
}
</style>
</head>

<body>

<header>
  <div>정책 자료 대시보드</div>
  <div>표시 <b id="count">0</b></div>
</header>

<div class="controls">
  <input class="search" id="search" placeholder="검색...">

  <div id="cats"></div>
  <div id="subs" style="margin-top:6px;"></div>
</div>

<main id="main"></main>

<script>
const DATA = [
  { cat:"정책기본구상", sub:"국회", org:"국토교통위원회", title:"의안", folder:"법령", url:"https://ltc.na.go.kr" },
  { cat:"정책기본구상", sub:"국회", org:"국회입법조사처", title:"보고서", folder:"법령", url:"https://nars.go.kr" },
  { cat:"지자체정책구상", sub:"서울특별시", org:"서울시", title:"보도자료", folder:"정책", url:"https://seoul.go.kr" }
];

let cat="all", sub="all", q="";

function buildFilters(){
  const cats=["all",...new Set(DATA.map(d=>d.cat))];
  document.getElementById("cats").innerHTML=
    cats.map(c=>`<button class="pill ${c===cat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join("");

  const subs=["all",...new Set(DATA.filter(d=>cat==='all'||d.cat===cat).map(d=>d.sub))];
  document.getElementById("subs").innerHTML=
    subs.map(s=>`<button class="pill ${s===sub?'active':''}" onclick="setSub('${s}')">${s}</button>`).join("");
}

function setCat(c){ cat=c; sub="all"; render(); }
function setSub(s){ sub=s; render(); }

function render(){
  buildFilters();

  const filtered = DATA.filter(d =>
    (cat==="all"||d.cat===cat) &&
    (sub==="all"||d.sub===sub) &&
    (!q || d.title.includes(q) || d.org.includes(q))
  );

  document.getElementById("count").textContent = filtered.length;

  document.getElementById("main").innerHTML = `
    <div class="cards">
      ${filtered.map(d=>`
        <div class="card">
          <div class="card-org">${d.org}</div>
          <div>${d.title}</div>
          <div class="card-folder">${d.folder}</div>
          <a class="btn" href="${d.url}" target="_blank">바로가기</a>
        </div>
      `).join("")}
    </div>
  `;
}

document.getElementById("search").oninput = e => {
  q = e.target.value;
  render();
};

render();
</script>

</body>
</html>
