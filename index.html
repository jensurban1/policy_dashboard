<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0e1117;
  --bg2:     #151a24;
  --bg3:     #1c2333;
  --bg4:     #232c40;
  --border:  #2a3348;
  --border2: #3a4a6a;
  --text:    #e2e8f4;
  --text2:   #8fa0c0;
  --text3:   #4a5a7a;
  --accent:  #3d8bff;
  --accent2: #1a5ccc;
  --amber:   #f59e0b;
  --rose:    #f43f5e;
  --shadow:  0 2px 12px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:      #f0f4fb;
  --bg2:     #ffffff;
  --bg3:     #e8eef8;
  --bg4:     #dce5f5;
  --border:  #c8d5ea;
  --border2: #a0b4d0;
  --text:    #1a2540;
  --text2:   #4a5a7a;
  --text3:   #8a9ab8;
  --accent:  #1a5ccc;
  --accent2: #0f3d99;
  --shadow:  0 2px 12px rgba(0,0,0,0.08);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background .3s, color .3s;
}

/* HEADER */
header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--accent); display: grid; place-items: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #fff; font-weight: 500;
}
.logo-title { font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
.logo-sub   { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
.header-right { display: flex; align-items: center; gap: 8px; }
.count-pill {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--text3); background: var(--bg3);
  border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px;
}
.count-pill b { color: var(--accent); font-weight: 500; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg3);
  cursor: pointer; display: grid; place-items: center;
  font-size: 15px; transition: background .15s, border-color .15s;
}
.icon-btn:hover { background: var(--bg4); border-color: var(--border2); }

/* CONTROLS */
.controls {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; flex-direction: column; gap: 10px;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; max-width: 400px; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--text3); pointer-events: none;
}
.search-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 12px 8px 32px;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  color: var(--text); outline: none; transition: border-color .2s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }
.pill {
  padding: 4px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text2); font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.pill:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
.flabel { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }

.view-toggle {
  display: flex; border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden; flex-shrink: 0;
}
.view-btn {
  padding: 5px 10px; background: transparent; border: none;
  cursor: pointer; color: var(--text3); font-size: 13px;
  display: grid; place-items: center; transition: background .15s, color .15s;
}
.view-btn:hover { background: var(--bg3); color: var(--text2); }
.view-btn.active { background: var(--accent); color: #fff; }

/* MAIN */
main { padding: 16px 24px 48px; max-width: 1400px; margin: 0 auto; }

.section-hd {
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  color: var(--text3); letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; margin-top: 22px;
}
.section-hd:first-child { margin-top: 4px; }
.section-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.cat-count {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 7px; font-size: 10px;
  color: var(--text3); letter-spacing: 0;
}

/* LIST VIEW */
.list-table {
  width: 100%; border-collapse: collapse;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  margin-bottom: 4px; box-shadow: var(--shadow);
  animation: fadeUp .25s ease both;
}
.list-table th {
  background: var(--bg3); font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text3); letter-spacing: .5px; text-transform: uppercase;
  padding: 8px 16px; text-align: left; font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.list-table td {
  padding: 11px 16px; font-size: 12.5px; color: var(--text2);
  border-bottom: 1px solid var(--border); vertical-align: middle;
}
.list-table tr:last-child td { border-bottom: none; }
.list-table tbody tr { transition: background .1s; }
.list-table tbody tr:hover td { background: var(--bg3); }

.cat-stripe {
  width: 3px; height: 22px; border-radius: 2px;
  display: inline-block; vertical-align: middle; margin-right: 10px; flex-shrink: 0;
}
.td-org { color: var(--text); font-weight: 500; font-size: 12px; white-space: nowrap; }
.td-titles { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.title-chip {
  font-size: 11px; background: var(--bg4); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; color: var(--text2);
}
.td-folder {
  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
  color: var(--text3); line-height: 1.8;
}
.star { color: var(--amber); }
.no-save { color: var(--rose); }

.link-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; background: var(--accent); color: #fff;
  font-size: 11.5px; font-weight: 500; border-radius: 6px;
  text-decoration: none; white-space: nowrap;
  transition: background .15s, transform .1s;
  font-family: 'Noto Sans KR', sans-serif;
}
.link-btn:hover { background: var(--accent2); transform: scale(1.03); }
.link-btn svg { width: 10px; height: 10px; }
.no-link { font-size: 10.5px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

/* CARD VIEW */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px; margin-bottom: 4px;
}
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 9px;
  position: relative; overflow: hidden;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  animation: fadeUp .25s ease both; box-shadow: var(--shadow);
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--cat-color, var(--accent));
}
.card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.35); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-org { font-size: 13px; font-weight: 600; color: var(--text); }
.cat-tag {
  font-size: 9px; padding: 2px 7px; border-radius: 4px;
  font-weight: 500; white-space: nowrap; flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
}
.card-titles { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.card-folders { display: flex; flex-direction: column; gap: 3px; }
.card-folder {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--text3); background: var(--bg3);
  border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; line-height: 1.5;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid var(--border); gap: 8px; margin-top: auto;
}
.url-host {
  font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* CATEGORY COLORS */
.cat-정책기본구상  { --cat-color: #3d8bff; }
.cat-지자체정책구상 { --cat-color: #14b8a6; }
.cat-사업계획안    { --cat-color: #f59e0b; }
.cat-각종법령      { --cat-color: #f43f5e; }

.stripe-정책기본구상  { background: #3d8bff; }
.stripe-지자체정책구상 { background: #14b8a6; }
.stripe-사업계획안    { background: #f59e0b; }
.stripe-각종법령      { background: #f43f5e; }

.tag-정책기본구상  { background: rgba(61,139,255,.15); color: #7ab4ff; border: 1px solid rgba(61,139,255,.3); }
.tag-지자체정책구상 { background: rgba(20,184,166,.15); color: #4dd9cc; border: 1px solid rgba(20,184,166,.3); }
.tag-사업계획안    { background: rgba(245,158,11,.15);  color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
.tag-각종법령      { background: rgba(244,63,94,.15);   color: #fb7185; border: 1px solid rgba(244,63,94,.3); }

[data-theme="light"] .tag-정책기본구상  { background: rgba(61,139,255,.1);  color: #1a5ccc; }
[data-theme="light"] .tag-지자체정책구상 { background: rgba(20,184,166,.1);  color: #0d8f83; }
[data-theme="light"] .tag-사업계획안    { background: rgba(245,158,11,.1);   color: #b45309; }
[data-theme="light"] .tag-각종법령      { background: rgba(244,63,94,.1);    color: #be123c; }

/* EMPTY */
.empty { text-align: center; padding: 60px; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

</div>

    title:"법, 시행령, 시행규칙, 조례 등",
    folder:"★사업별 자료 - 법령/지침 (파일이 아닌 링크로 저장)",
    url:"https://www.law.go.kr/main.html" },

const CAT_LABELS = {
  정책기본구상:"정책기본구상", 지자체정책구상:"지자체정책구상",
  사업계획안:"사업계획(안)", 각종법령:"각종 법령"
};

let activeCat = "all", activeSub = "all", searchQ = "", viewMode = "list";

// Merge by (org + url) key — keeps different orgs separate even if URL matches
function mergeItems(items) {
  const map = new Map();
  items.forEach(d => {
    const key = d.org + "||" + (d.url || d.title);
    if (!map.has(key)) {
      map.set(key, { ...d, titles: [d.title], folders: [d.folder] });
    } else {
      const m = map.get(key);
      if (!m.titles.includes(d.title))   m.titles.push(d.title);
      if (!m.folders.includes(d.folder)) m.folders.push(d.folder);
    }
  });
  return [...map.values()];
}

function fmtFolder(f) {
  return f.replace(/★/g, '<span class="star">★</span>')
          .replace(/저장 X/g, '<span class="no-save">저장 X</span>');
}

function linkBtn(url) {
  if (!url) return `<span class="no-link">링크없음</span>`;
  return `<a class="link-btn" href="${url}" target="_blank" rel="noopener">
    바로가기
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 6h8M7 3l3 3-3 3"/>
    </svg>
  </a>`;
}

function buildSubs(cat) {
  const pills = document.getElementById("subPills");
  const subs = ["all", ...new Set(DATA.filter(d => cat === "all" || d.cat === cat).map(d => d.sub))];
  activeSub = "all";
  pills.innerHTML = "";
  subs.forEach(s => {
    const b = document.createElement("button");
    b.className = "pill" + (s === "all" ? " active" : "");
    b.dataset.sub = s;
    b.textContent = s === "all" ? "전체" : s;
    b.onclick = () => {
      document.querySelectorAll("[data-sub]").forEach(x => x.classList.remove("active"));
      b.classList.add("active"); activeSub = s; render();
    };
    pills.appendChild(b);
  });
}

function countMerged(grouped) {
  let n = 0;
  Object.values(grouped).forEach(sg => Object.values(sg).forEach(it => n += mergeItems(it).length));
  return n;
}

function render() {
  const main = document.getElementById("main");
  const q = searchQ.trim().toLowerCase();

  const filtered = DATA.filter(d =>
    (activeCat === "all" || d.cat === activeCat) &&
    (activeSub === "all" || d.sub === activeSub) &&
    (!q || d.title.includes(q) || d.org.includes(q) || d.sub.includes(q))
  );

  const grouped = {};
  filtered.forEach(d => {
    (grouped[d.cat] = grouped[d.cat] || {})[d.sub] =
      (grouped[d.cat][d.sub] || []).concat(d);
  });

  document.getElementById("visCount").textContent = countMerged(grouped);
  main.innerHTML = "";

  if (!filtered.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>검색 결과가 없습니다.</div>`;
    return;
  }

  Object.entries(grouped).forEach(([cat, subGroups]) => {
    const catCount = Object.values(subGroups).reduce((a, b) => a + mergeItems(b).length, 0);

    const hd = document.createElement("div");
    hd.className = "section-hd";
    hd.innerHTML = `${CAT_LABELS[cat] || cat} <span class="cat-count">${catCount}건</span>`;
    main.appendChild(hd);

    if (viewMode === "list") {
      const tbl = document.createElement("table");
      tbl.className = "list-table";
      tbl.innerHTML = `<colgroup>
          <col style="width:18%"><col style="width:26%"><col style="width:34%"><col style="width:22%">
        </colgroup>
        <thead><tr>
          <th>기관</th><th>자료명</th><th>폴더 체계</th><th style="text-align:right">바로가기</th>
        </tr></thead>`;
      const tbody = document.createElement("tbody");

      Object.values(subGroups).forEach(items => {
        mergeItems(items).forEach((d, i) => {
          const tr = document.createElement("tr");
          tr.style.animationDelay = `${i * 15}ms`;

          const titlesHtml = d.titles.length === 1
            ? `<span style="color:var(--text)">${d.titles[0]}</span>`
            : `<div class="td-titles">${d.titles.map(t => `<span class="title-chip">${t}</span>`).join("")}</div>`;

          const foldersHtml = [...new Set(d.folders)]
            .map(f => fmtFolder(f)).join("<br>");

          tr.innerHTML = `
            <td class="td-org">
              <div style="display:flex;align-items:center">
                <span class="cat-stripe stripe-${cat}"></span>${d.org}
              </div>
            </td>
            <td>${titlesHtml}</td>
            <td class="td-folder">${foldersHtml}</td>
            <td style="text-align:right">${linkBtn(d.url)}</td>
          `;
          tbody.appendChild(tr);
        });
      });
      tbl.appendChild(tbody);
      main.appendChild(tbl);

    } else {
      const grid = document.createElement("div");
      grid.className = "cards-grid";

      Object.values(subGroups).forEach(items => {
        mergeItems(items).forEach((d, i) => {
          const card = document.createElement("div");
          card.className = `card cat-${cat}`;
          card.style.animationDelay = `${i * 25}ms`;
          const hasUrl = !!d.url;
          const host = hasUrl ? new URL(d.url).hostname : "";

          const titlesHtml = d.titles.length === 1
            ? `<div style="font-size:12.5px;color:var(--text2);margin-top:4px">${d.titles[0]}</div>`
            : `<div class="card-titles">${d.titles.map(t=>`<span class="title-chip">${t}</span>`).join("")}</div>`;

          card.innerHTML = `
            <div class="card-top">
              <div style="flex:1;min-width:0">
                <div class="card-org">${d.org}</div>
                ${titlesHtml}
              </div>
              <span class="cat-tag tag-${cat}">${CAT_LABELS[cat]}</span>
            </div>
            <div class="card-folders">
              ${[...new Set(d.folders)].map(f=>`<span class="card-folder">${fmtFolder(f)}</span>`).join("")}
            </div>
            <div class="card-footer">
              <span class="url-host">${host}</span>
              ${linkBtn(d.url)}
            </div>
          `;
          grid.appendChild(card);
        });
      });
      main.appendChild(grid);
    }
  });
}

// Total count
{
  const g = {};
  DATA.forEach(d => { (g[d.cat]=g[d.cat]||{})[d.sub]=(g[d.cat][d.sub]||[]).concat(d); });
  document.getElementById("totCount").textContent = countMerged(g);
}

document.querySelectorAll("[data-cat]").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll("[data-cat]").forEach(x => x.classList.remove("active"));
    b.classList.add("active"); activeCat = b.dataset.cat;
    buildSubs(activeCat); render();
  };
});

document.getElementById("btnList").onclick = () => {
  viewMode = "list";
  document.getElementById("btnList").classList.add("active");
  document.getElementById("btnCard").classList.remove("active");
  render();
};
document.getElementById("btnCard").onclick = () => {
  viewMode = "card";
  document.getElementById("btnCard").classList.add("active");
  document.getElementById("btnList").classList.remove("active");
  render();
};

document.getElementById("searchInput").oninput = e => { searchQ = e.target.value; render(); };

document.getElementById("themeBtn").onclick = () => {
  const dark = document.documentElement.dataset.theme === "dark";
  document.documentElement.dataset.theme = dark ? "light" : "dark";
  document.getElementById("themeBtn").textContent = dark ? "☀️" : "🌙";
};

buildSubs("all");
render();
</script>
</body>
