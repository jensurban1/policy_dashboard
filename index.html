<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --mono:"D2Coding","Consolas","Courier New",monospace;
  --bg:#f7f8fa;--bg2:#fff;--bg3:#f2f4f7;--bg4:#eaecf2;
  --bd:rgba(0,0,0,0.07);--bd2:rgba(0,0,0,0.13);
  --t:#111827;--t2:#4b5563;--t3:#9ca3af;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-bd:#bfdbfe;
  --amber:#d97706;--red:#dc2626;
  --sb:#1e2433;--sb-t:#cbd5e1;--sb-m:#64748b;
}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
aside{width:188px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.brand-t{font-size:13px;font-weight:600;color:#f1f5f9;letter-spacing:-.2px;}
.brand-s{font-size:10px;color:var(--sb-m);margin-top:2px;font-family:var(--mono);}
.nav-sec{padding:14px 8px 4px;}
.nav-lbl{font-size:9.5px;color:var(--sb-m);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sb-t);transition:background .12s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:rgba(255,255,255,.09);color:#f1f5f9;font-weight:500;}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-icon{font-size:13px;line-height:1;}
.nav-ext{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;font-size:11.5px;color:var(--sb-m);text-decoration:none;transition:color .12s,background .12s;}
.nav-ext:hover{color:var(--sb-t);background:rgba(255,255,255,.05);}
.nav-ext-arr{font-size:10px;margin-left:auto;}
.nav-div{height:1px;background:rgba(255,255,255,.07);margin:8px 16px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.topbar-t{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.topbar-s{font-size:11px;color:var(--t3);margin-top:2px;}
.topbar-r{display:flex;align-items:center;gap:8px;}
.new-pill{background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:2px 8px;font-family:var(--mono);display:none;}
.new-pill.on{display:inline-block;}
.upd-time{font-size:10px;color:var(--t3);font-family:var(--mono);}
.srch{position:relative;}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none;}
.srch input{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px 6px 28px;font-size:12px;font-family:var(--font);color:var(--t);outline:none;width:200px;transition:border-color .15s;}
.srch input:focus{border-color:var(--blue);}
.srch input::placeholder{color:var(--t3);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px 48px;}

/* FEED GRID */
.feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

/* SOURCE CARD */
.src-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
.card-hd{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-hd-left{display:flex;align-items:center;gap:8px;min-width:0;}
.card-acc{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.card-info{}
.card-name{font-size:12.5px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-org{font-size:10.5px;color:var(--t3);margin-top:1px;}
.card-go{font-size:11px;color:var(--blue);text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap;}
.card-go:hover{opacity:.7;}
.card-go svg{width:10px;height:10px;}

/* POST LIST */
.card-body{flex:1;}
.post-row{display:flex;align-items:baseline;gap:8px;padding:7px 14px;border-bottom:1px solid var(--bd);transition:background .1s;}
.post-row:last-child{border-bottom:none;}
.post-row:hover{background:var(--bg3);}
.badge-new{font-size:9px;padding:1px 5px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:3px;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.post-date{font-size:10.5px;color:var(--t3);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.post-a{font-size:12px;color:var(--t);text-decoration:none;line-height:1.4;flex:1;}
.post-a:hover{color:var(--blue);}
.card-msg{padding:18px 14px;font-size:12px;color:var(--t3);text-align:center;line-height:1.6;}
.card-msg code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px;}

/* STATIC CARD (크롤링 불가) */
.static-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;padding:10px 14px;}
.static-item{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:8px 10px;}
.si-cat{font-size:9px;color:var(--blue);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono);}
.si-title{font-size:11.5px;color:var(--t);font-weight:500;line-height:1.4;}
.si-desc{font-size:10.5px;color:var(--t2);margin-top:2px;line-height:1.4;}
.static-note{padding:0 14px 10px;font-size:10.5px;color:var(--t3);font-style:italic;line-height:1.5;}

/* LIST MODE */
.sec-block{margin-bottom:22px;}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-acc{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.sec-name{font-size:13px;font-weight:600;}
.sec-cnt{font-size:11px;color:var(--t3);}
.list-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.col-hd{display:grid;grid-template-columns:20% 30% 34% 1fr;padding:7px 14px;background:var(--bg3);border-bottom:1px solid var(--bd);}
.col-hd span{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.3px;text-transform:uppercase;}
.col-hd span:last-child{text-align:right;}
.list-row{display:grid;grid-template-columns:20% 30% 34% 1fr;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd);min-height:42px;}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:var(--bg3);}
.col-org{font-size:12px;font-weight:600;color:var(--t);padding-right:10px;}
.chips{display:flex;flex-wrap:wrap;gap:3px;padding-right:10px;}
.chip{font-size:11px;padding:2px 7px;border:1px solid var(--bd2);border-radius:4px;color:var(--t2);background:var(--bg3);}
.col-folder{font-family:var(--mono);font-size:10.5px;color:var(--t3);line-height:1.7;padding-right:10px;}
.star{color:var(--amber);}
.nosave{color:var(--red);font-style:italic;}
.col-link{text-align:right;}
.go-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--blue);text-decoration:none;}
.go-btn:hover{opacity:.65;}
.go-btn svg{width:10px;height:10px;}

/* cat accent */
.acc-정책기본구상,.card-acc-정책기본구상{background:#2563eb;}
.acc-지자체정책구상,.card-acc-지자체정책구상{background:#0d9488;}
.acc-사업계획안,.card-acc-사업계획안{background:#d97706;}
.acc-각종법령,.card-acc-각종법령{background:#dc2626;}
.dot-정책기본구상{background:#2563eb;}
.dot-지자체정책구상{background:#0d9488;}
.dot-사업계획안{background:#d97706;}
.dot-각종법령{background:#dc2626;}

.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>

const CAT_LABELS={정책기본구상:"정책기본구상",지자체정책구상:"지자체정책구상",사업계획안:"사업계획(안)",각종법령:"각종 법령"};
const CAT_SUBS={정책기본구상:"국회 · 국토연구원 · 국토교통부",지자체정책구상:"서울특별시 · 서울시의회",사업계획안:"서울특별시",각종법령:"국가법령정보센터"};

let viewMode="feed", activeCat="정책기본구상", searchQ="";
let updData=null;

function goSvg(){return`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2M5 2h5v5"/></svg>`;}
function fmt(f){return f.replace(/★/g,'<span class="star">★</span>').replace(/저장 X/g,'<span class="nosave">저장 X</span>');}

async function loadUpdates(){
  if(updData) return updData;
  try{
    const r=await fetch("data/updates.json?t="+Date.now());
    if(!r.ok) throw new Error();
    updData=await r.json();
    let n=0;
    Object.values(updData.sources).forEach(s=>s.items.forEach(i=>{if(i.is_new)n++;}));
    if(n>0){const el=document.getElementById("newPill");el.textContent=n+" NEW";el.classList.add("on");}
    const d=new Date(updData.updated_at);
    document.getElementById("updTime").textContent="업데이트 "+d.toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
    return updData;
  }catch{return null;}
}

function renderFeedCard(src, data){
  const q=searchQ.trim().toLowerCase();
  const card=document.createElement("div");
  card.className="src-card";

  card.innerHTML=`<div class="card-hd">
    <div class="card-hd-left">
      <span class="card-acc card-acc-${src.cat}"></span>
      <div class="card-info">
        <div class="card-name">${src.name}</div>
        <div class="card-org">${src.org}</div>
      </div>
    </div>
    <a class="card-go" href="${src.url}" target="_blank" rel="noopener">원문 ${goSvg()}</a>
  </div>
  <div class="card-body" id="cb-${src.sid}"></div>`;

  const body=card.querySelector(`#cb-${src.sid}`);

  if(!data){
    body.innerHTML=`<div class="card-msg">⚠ <code>data/updates.json</code>이 없습니다.<br>GitHub Actions를 먼저 실행해주세요.</div>`;
    return card;
  }
  const s=data.sources[src.sid];

  // 수집 항목 없으면 → 정적 안내가 있으면 그걸로, 없으면 빈 메시지
  if(!s||!s.items.length){
    if(src.static){
      // 정적 안내 카드로 fallback
      const grid=src.static.items.map(it=>`<div class="static-item"><div class="si-cat">${it.cat}</div><div class="si-title">${it.title}</div><div class="si-desc">${it.desc}</div></div>`).join('');
      body.innerHTML=`<div class="static-grid">${grid}</div>${src.static.note?`<div class="static-note">${src.static.note}</div>`:''}`;
    } else {
      body.innerHTML=`<div class="card-msg">수집된 항목이 없습니다.</div>`;
    }
    return card;
  }

  // 소스별 표시 개수: 서울시는 5건, 나머지는 전체
  const maxItems = src.sid === "seoul_press" ? 5 : s.items.length;
  const allItems = q ? s.items.filter(i=>i.title.toLowerCase().indexOf(q)!==-1) : s.items;
  const items = allItems.slice(0, maxItems);
  if(!items.length){body.innerHTML=`<div class="card-msg">검색 결과가 없습니다.</div>`;return card;}

  body.innerHTML=items.map(item=>{
    const badge=item.is_new?`<span class="badge-new">NEW</span>`:'';
    const date=item.date?`<span class="post-date">${item.date}</span>`:'';
    const dept=item.dept?`<span class="post-date">[${item.dept}]</span>`:'';
    return`<div class="post-row">${badge}${date}${dept}<a class="post-a" href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>`;
  }).join('');
  return card;
}

function renderStaticCard(src){
  const card=document.createElement("div");
  card.className="src-card";
  card.innerHTML=`<div class="card-hd">
    <div class="card-hd-left">
      <span class="card-acc card-acc-${src.cat}"></span>
      <div class="card-info">
        <div class="card-name">${src.name}</div>
        <div class="card-org">${src.org}</div>
      </div>
    </div>
    <a class="card-go" href="${src.url}" target="_blank" rel="noopener">바로가기 ${goSvg()}</a>
  </div>
  <div class="static-grid">${src.items.map(it=>`<div class="static-item"><div class="si-cat">${it.cat}</div><div class="si-title">${it.title}</div><div class="si-desc">${it.desc}</div></div>`).join('')}</div>
  ${src.note?`<div class="static-note">${src.note}</div>`:''}`;
  return card;
}

async function render(){
  const content=document.getElementById("content");
  content.innerHTML="";

  if(viewMode==="feed"){
    const data=await loadUpdates();
    const grid=document.createElement("div");
    grid.className="feed-grid";
    // 크롤링 가능한 소스: 실제 게시글
    FEED_SOURCES.forEach(src=>grid.appendChild(renderFeedCard(src,data)));
    // 크롤링 불가 소스: 페이지 안내
    const q=searchQ.trim().toLowerCase();
    STATIC_SOURCES.forEach(src=>{
      if(q&&src.name.toLowerCase().indexOf(q)===-1&&src.org.toLowerCase().indexOf(q)===-1) return;
      grid.appendChild(renderStaticCard(src));
    });
    content.appendChild(grid);

  } else {
    // 링크 목록 모드
    const q=searchQ.trim().toLowerCase();
    const filtered=LIST_DATA.filter(d=>
      d.cat===activeCat&&
      (!q||d.org.toLowerCase().indexOf(q)!==-1||d.titles.some(t=>t.toLowerCase().indexOf(q)!==-1))
    );
    if(!filtered.length){content.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}

    const bySub={};
    filtered.forEach(d=>{(bySub[d.sub]=bySub[d.sub]||[]).push(d);});

    Object.entries(bySub).forEach(([sub,items])=>{
      const block=document.createElement("div");
      block.className="sec-block";
      block.innerHTML=`<div class="sec-hd"><span class="sec-acc acc-${activeCat}"></span><span class="sec-name">${sub}</span><span class="sec-cnt">${items.length}건</span></div>`;

      const wrap=document.createElement("div");
      wrap.className="list-wrap";
      const colHd=document.createElement("div");
      colHd.className="col-hd";
      colHd.innerHTML="<span>기관</span><span>자료명</span><span>폴더 체계</span><span>바로가기</span>";
      wrap.appendChild(colHd);

      const byOrg=new Map();
      items.forEach(d=>{if(!byOrg.has(d.org))byOrg.set(d.org,[]);byOrg.get(d.org).push(d);});
      byOrg.forEach((rows,org)=>{
        rows.forEach((d,ri)=>{
          const row=document.createElement("div");
          row.className="list-row";
          row.innerHTML=`<div class="col-org">${ri===0?org:''}</div>
            <div class="chips">${d.titles.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
            <div class="col-folder">${fmt(d.folder)}</div>
            <div class="col-link">${d.url?`<a class="go-btn" href="${d.url}" target="_blank" rel="noopener">바로가기${goSvg()}</a>`:'<span style="font-size:11px;color:var(--t3)">-</span>'}</div>`;
          wrap.appendChild(row);
        });
      });
      block.appendChild(wrap);
      content.appendChild(block);
    });
  }
}

function setFeed(){
  viewMode="feed";
  document.querySelectorAll(".nav-item[data-view]").forEach(el=>el.classList.toggle("active",el.dataset.view==="feed"));
  document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.classList.remove("active"));
  document.getElementById("topTitle").textContent="최신 업데이트";
  document.getElementById("topSub").textContent="국토연구원 · 국회입법조사처 · 서울시 최신 게시글";
  render();
}
function setListCat(cat){
  viewMode="list"; activeCat=cat;
  document.querySelectorAll(".nav-item[data-view]").forEach(el=>el.classList.toggle("active",el.dataset.view==="list"));
  document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.classList.toggle("active",el.dataset.cat===cat));
  document.getElementById("topTitle").textContent=CAT_LABELS[cat]||cat;
  document.getElementById("topSub").textContent=CAT_SUBS[cat]||"";
  render();
}

document.querySelectorAll(".nav-item[data-view]").forEach(el=>el.addEventListener("click",()=>el.dataset.view==="feed"?setFeed():setListCat(activeCat)));
document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.addEventListener("click",()=>setListCat(el.dataset.cat)));
document.getElementById("searchInput").addEventListener("input",e=>{searchQ=e.target.value;render();});

render();
</script>
