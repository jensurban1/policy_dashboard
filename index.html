<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 자료 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font: -apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --mono: "D2Coding","Consolas","Courier New",monospace;
  --bg:#f7f8fa; --bg2:#fff; --bg3:#f2f4f7; --bg4:#eaecf2;
  --bd:rgba(0,0,0,0.07); --bd2:rgba(0,0,0,0.13);
  --t:#111827; --t2:#4b5563; --t3:#9ca3af;
  --blue:#2563eb; --blue-lt:#eff6ff; --blue-bd:#bfdbfe;
  --amber:#d97706; --red:#dc2626;
  --sb:#1e2433; --sb-t:#cbd5e1; --sb-m:#64748b;
}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
aside{width:188px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;height:100%;overflow-y:auto;}
.brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.brand-t{font-size:13px;font-weight:600;color:#f1f5f9;letter-spacing:-.2px;}
.brand-s{font-size:10px;color:var(--sb-m);margin-top:2px;font-family:var(--mono);}
.nav-sec{padding:14px 8px 4px;}
.nav-lbl{font-size:9.5px;color:var(--sb-m);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sb-t);transition:background .12s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{background:rgba(255,255,255,.09);color:#f1f5f9;font-weight:500;}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.nav-ext{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;font-size:11.5px;color:var(--sb-m);text-decoration:none;transition:color .12s,background .12s;}
.nav-ext:hover{color:var(--sb-t);background:rgba(255,255,255,.05);}
.nav-ext-arr{font-size:10px;margin-left:auto;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10;}
.topbar-t{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.topbar-s{font-size:11px;color:var(--t3);margin-top:2px;}
.srch{position:relative;}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none;}
.srch input{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:6px 10px 6px 28px;font-size:12px;font-family:var(--font);color:var(--t);outline:none;width:210px;transition:border-color .15s;}
.srch input:focus{border-color:var(--blue);}
.srch input::placeholder{color:var(--t3);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px 24px 48px;position:relative;z-index:1;}

.sec-block{margin-bottom:24px;}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-acc{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.sec-name{font-size:13px;font-weight:600;letter-spacing:-.2px;}
.sec-cnt{font-size:11px;color:var(--t3);}

/* ── LIST CONTAINER ── */
.list-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}

/* column header */
.col-hd{display:grid;grid-template-columns:18% 27% 31% 1fr;padding:7px 16px;background:var(--bg3);border-bottom:1px solid var(--bd);}
.col-hd span{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.3px;text-transform:uppercase;}
.col-hd span:last-child{text-align:right;}

/* each row group = data-row + preview */
.row-group{}
.row-group:not(:last-child){border-bottom:1px solid var(--bd);}

/* data row */
.data-row{display:grid;grid-template-columns:18% 27% 31% 1fr;align-items:center;padding:11px 16px;gap:0;cursor:pointer;transition:background .1s;min-height:46px;}
.data-row:hover{background:var(--bg3);}
.data-row.open{background:var(--blue-lt);}

.col-org{font-size:12.5px;font-weight:600;color:var(--t);padding-right:12px;}
.col-titles{display:flex;flex-wrap:wrap;gap:4px;padding-right:12px;}
.chip{font-size:11px;padding:2px 8px;border:1px solid var(--bd2);border-radius:4px;color:var(--t2);background:var(--bg3);white-space:nowrap;}
.col-folder{font-family:var(--mono);font-size:10.5px;color:var(--t3);line-height:1.7;padding-right:12px;}
.star{color:var(--amber);}
.nosave{color:var(--red);font-style:italic;}
.col-link{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.go-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--blue);text-decoration:none;white-space:nowrap;transition:opacity .15s;}
.go-btn:hover{opacity:.65;}
.go-btn svg{width:11px;height:11px;}
.no-link{font-size:11px;color:var(--t3);font-family:var(--mono);}
.expand-chevron{font-size:11px;color:var(--t3);transition:transform .2s;line-height:1;}
.open .expand-chevron{transform:rotate(180deg);}

/* preview panel */
.preview-panel{display:none;background:var(--blue-lt);border-top:1px solid var(--blue-bd);padding:14px 16px 16px;}
.preview-panel.visible{display:block;}
.preview-lbl{font-size:9.5px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-family:var(--mono);}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.pi{background:var(--bg2);border:1px solid var(--blue-bd);border-radius:6px;padding:10px 12px;}
.pi-cat{font-size:9px;color:var(--blue);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono);}
.pi-title{font-size:12px;color:var(--t);font-weight:500;line-height:1.4;}
.pi-desc{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5;}
.preview-note{font-size:11px;color:var(--t3);margin-top:10px;font-style:italic;line-height:1.5;}

/* ── UPDATES PANEL ── */
.updates-bar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0;overflow:hidden;max-height:0;transition:max-height .3s ease;}
.updates-bar.open{max-height:340px;}
.updates-inner{padding:14px 24px 16px;}
.updates-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.updates-title{font-size:12px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:6px;}
.new-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0;}
.updates-meta{font-size:10px;color:var(--t3);font-family:var(--mono);}
.updates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;max-height:220px;overflow-y:auto;}
.update-group{}
.update-group-label{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-family:var(--mono);}
.update-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);}
.update-item:last-child{border-bottom:none;}
.update-badge{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px;font-family:var(--mono);}
.badge-new{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.badge-existing{background:var(--bg3);color:var(--t3);border:1px solid var(--bd);}
.update-link{font-size:12px;color:var(--blue);text-decoration:none;line-height:1.4;}
.update-link:hover{text-decoration:underline;}
.update-empty{font-size:12px;color:var(--t3);padding:20px 0;text-align:center;}
.update-error{font-size:12px;color:#dc2626;padding:12px 0;}

/* topbar toggle btn */
.updates-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:5px 12px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.updates-toggle:hover{background:var(--bg4);}
.updates-toggle .badge-cnt{background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;font-family:var(--mono);display:none;}
.updates-toggle .badge-cnt.visible{display:inline-block;}
.acc-정책기본구상{background:#2563eb;} .acc-지자체정책구상{background:#0d9488;} .acc-사업계획안{background:#d97706;} .acc-각종법령{background:#dc2626;}
.dot-정책기본구상{background:#2563eb;} .dot-지자체정책구상{background:#0d9488;} .dot-사업계획안{background:#d97706;} .dot-각종법령{background:#dc2626;}

.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
</style>
</head>
<body>

<aside>

        <input id="searchInput" type="text" placeholder="기관명, 자료명 검색…">
      </div>

  <!-- UPDATES PANEL -->
  <div class="updates-bar" id="updatesBar">

      <div class="updates-hd">

</div>

const CAT_SUBS={정책기본구상:"국회 · 국토연구원 · 국토교통부",지자체정책구상:"서울특별시 · 서울시의회",사업계획안:"서울특별시",각종법령:"국가법령정보센터"};

let activeCat="정책기본구상", searchQ="";

function fmt(f){
  return f.replace(/★/g,'<span class="star">★</span>').replace(/저장 X/g,'<span class="nosave">저장 X</span>');
}
function goBtn(url){
  if(!url) return '<span class="no-link">-</span>';
  return `<a class="go-btn" href="${url}" target="_blank" rel="noopener">바로가기<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2M5 2h5v5"/></svg></a>`;
}
function buildPreview(url){
  const p=PREVIEWS[url]; if(!p) return null;
  const cards=p.items.map(it=>`<div class="pi"><div class="pi-cat">${it.cat}</div><div class="pi-title">${it.title}</div><div class="pi-desc">${it.desc}</div></div>`).join('');
  return `<div class="preview-lbl">${p.label}</div><div class="preview-grid">${cards}</div>${p.note?`<div class="preview-note">${p.note}</div>`:''}`;
}

function match(str,q){return str.toLowerCase().indexOf(q)!==-1;}

function render(){
  const content=document.getElementById("content");
  const q=searchQ.trim().toLowerCase();

  const filtered=DATA.filter(d=>{
    const catOk=q?true:d.cat===activeCat;
    const qOk=!q||match(d.org,q)||d.titles.some(t=>match(t,q))||match(d.sub,q)||match(d.folder,q);
    return catOk&&qOk;
  });

  const bySub={};
  filtered.forEach(d=>{
    const key=q?`[${CAT_LABELS[d.cat]}] ${d.sub}`:d.sub;
    (bySub[key]=bySub[key]||[]).push(d);
  });

  content.innerHTML="";
  if(!filtered.length){content.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}

  Object.entries(bySub).forEach(([sub,items])=>{
    // section block
    const block=document.createElement("div");
    block.className="sec-block";

    const repCat=items[0].cat;
    const hd=document.createElement("div");
    hd.className="sec-hd";
    hd.innerHTML=`<span class="sec-acc acc-${repCat}"></span><span class="sec-name">${sub}</span><span class="sec-cnt">${items.length}건</span>`;
    block.appendChild(hd);

    const listWrap=document.createElement("div");
    listWrap.className="list-wrap";

    // column header
    const colHd=document.createElement("div");
    colHd.className="col-hd";
    colHd.innerHTML='<span>기관</span><span>자료명</span><span>폴더 체계</span><span>바로가기</span>';
    listWrap.appendChild(colHd);

    // group by org
    const byOrg=new Map();
    items.forEach(d=>{
      if(!byOrg.has(d.org)) byOrg.set(d.org,[]);
      byOrg.get(d.org).push(d);
    });

    byOrg.forEach((rows, org)=>{
      rows.forEach((d, ri)=>{
        const hasPreview=!!PREVIEWS[d.url];
        const previewHtml=hasPreview?buildPreview(d.url):null;

        // row group wraps data-row + preview-panel together
        const rg=document.createElement("div");
        rg.className="row-group";

        // data row
        const dr=document.createElement("div");
        dr.className="data-row";

        const orgCell=`<div class="col-org">${ri===0?org:''}</div>`;
        const titlesCell=`<div class="col-titles">${d.titles.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`;
        const folderCell=`<div class="col-folder">${fmt(d.folder)}</div>`;
        const linkCell=`<div class="col-link">${goBtn(d.url)}${hasPreview?'<span class="expand-chevron">▾</span>':''}</div>`;
        dr.innerHTML=orgCell+titlesCell+folderCell+linkCell;

        rg.appendChild(dr);

        // preview panel (sibling, not inside table)
        if(hasPreview){
          const pp=document.createElement("div");
          pp.className="preview-panel";
          pp.innerHTML=previewHtml;
          rg.appendChild(pp);

          dr.addEventListener("click",function(e){
            if(e.target.tagName==="A") return;
            const open=dr.classList.toggle("open");
            pp.classList.toggle("visible",open);
          });
        }

        listWrap.appendChild(rg);
      });
    });

    block.appendChild(listWrap);
    content.appendChild(block);
  });
}

function setActiveCat(cat){
  activeCat=cat;
  document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.classList.toggle("active",el.dataset.cat===cat));
  document.getElementById("topTitle").textContent=CAT_LABELS[cat]||cat;
  document.getElementById("topSub").textContent=CAT_SUBS[cat]||"";
  render();
}

document.querySelectorAll(".nav-item[data-cat]").forEach(el=>el.addEventListener("click",()=>setActiveCat(el.dataset.cat)));
document.getElementById("searchInput").addEventListener("input",e=>{searchQ=e.target.value;render();});

const updatesBar = document.getElementById("updatesBar");
const updatesToggle = document.getElementById("updatesToggle");
const updatesGrid = document.getElementById("updatesGrid");
const updatesMeta = document.getElementById("updatesMeta");
const newCnt = document.getElementById("newCnt");
let updatesLoaded = false;

async function loadUpdates() {
  try {
    const res = await fetch("data/updates.json?t=" + Date.now());
    if (!res.ok) throw new Error("파일 없음");
    const data = await res.json();

    const kst = new Date(data.updated_at);
    const dateStr = kst.toLocaleString("ko-KR", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
    updatesMeta.textContent = "마지막 업데이트: " + dateStr;

    let totalNew = 0;
    const groups = Object.values(data.sources);
    let html = "";

    groups.forEach(g => {
      const newItems = g.items.filter(i => i.is_new);
      const otherItems = g.items.filter(i => !i.is_new).slice(0, 3);
      totalNew += newItems.length;

      const allItems = [...newItems, ...otherItems];
      if (!allItems.length) return;

      html += `<div class="update-group">
        <div class="update-group-label">${g.org} · ${g.name}</div>`;
      allItems.forEach(item => {
        const badge = item.is_new
          ? `<span class="update-badge badge-new">NEW</span>`
          : `<span class="update-badge badge-existing">기존</span>`;
        html += `<div class="update-item">
          ${badge}
          <a class="update-link" href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
        </div>`;
      });
      html += `</div>`;
    });

    updatesGrid.innerHTML = html || `<div class="update-empty">새 항목이 없습니다.</div>`;

    if (totalNew > 0) {
      newCnt.textContent = totalNew;
      newCnt.classList.add("visible");
    }
  } catch(e) {
    updatesGrid.innerHTML = `<div class="update-error">⚠ data/updates.json을 찾을 수 없습니다.<br>GitHub Actions를 먼저 실행해주세요.</div>`;
    updatesMeta.textContent = "";
  }
}

updatesToggle.addEventListener("click", () => {
  const isOpen = updatesBar.classList.toggle("open");
  if (isOpen && !updatesLoaded) {
    loadUpdates();
    updatesLoaded = true;
  }
});

render();
</script>
</body>
</html>
